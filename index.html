<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>하준이 육아일기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
:root{
  --navy:#0f1b3d;
  --card:rgba(255,255,255,.72);
  --line:rgba(255,255,255,.35);
  --text:#1c2340;
  --muted:#67708f;
  --pink:#ffc6de;
  --yellow:#ffe7a8;
}
html,body{margin:0;padding:0}
body{
  font-family:'Gowun Dodum','Gaegu',sans-serif;
  background:
    radial-gradient(circle at 15% 10%, rgba(84,110,255,.18), transparent 28%),
    radial-gradient(circle at 80% 8%, rgba(255,255,255,.08), transparent 20%),
    linear-gradient(180deg,var(--navy),#0b1330 55%, #10193d);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.9;
  background:
    radial-gradient(circle at 8% 14%, rgba(255,255,255,.95) 0 1.2px, transparent 1.8px),
    radial-gradient(circle at 16% 32%, rgba(255,255,255,.7) 0 1px, transparent 1.6px),
    radial-gradient(circle at 27% 18%, rgba(255,244,200,.95) 0 1.4px, transparent 2px),
    radial-gradient(circle at 35% 42%, rgba(255,255,255,.85) 0 1.1px, transparent 1.7px),
    radial-gradient(circle at 48% 12%, rgba(255,255,255,.9) 0 1.3px, transparent 1.9px),
    radial-gradient(circle at 56% 28%, rgba(255,240,180,.9) 0 1.5px, transparent 2.1px),
    radial-gradient(circle at 64% 16%, rgba(255,255,255,.75) 0 1px, transparent 1.6px),
    radial-gradient(circle at 73% 38%, rgba(255,255,255,.95) 0 1.2px, transparent 1.8px),
    radial-gradient(circle at 82% 11%, rgba(255,250,220,.95) 0 1.4px, transparent 2px),
    radial-gradient(circle at 91% 27%, rgba(255,255,255,.8) 0 1.1px, transparent 1.7px),
    radial-gradient(circle at 12% 64%, rgba(255,255,255,.9) 0 1.2px, transparent 1.8px),
    radial-gradient(circle at 22% 78%, rgba(255,244,200,.9) 0 1.5px, transparent 2px),
    radial-gradient(circle at 37% 69%, rgba(255,255,255,.75) 0 1px, transparent 1.6px),
    radial-gradient(circle at 46% 86%, rgba(255,255,255,.9) 0 1.2px, transparent 1.8px),
    radial-gradient(circle at 58% 62%, rgba(255,255,255,.85) 0 1.1px, transparent 1.7px),
    radial-gradient(circle at 69% 74%, rgba(255,250,220,.95) 0 1.4px, transparent 2px),
    radial-gradient(circle at 79% 66%, rgba(255,255,255,.8) 0 1px, transparent 1.6px),
    radial-gradient(circle at 88% 83%, rgba(255,255,255,.9) 0 1.2px, transparent 1.8px);
  animation:twinkle 5s ease-in-out infinite alternate;
}
@keyframes twinkle{
  from{opacity:.2}
  to{opacity:.38}
}

.hidden{display:none!important}

.shell,.app,.lock{
  position:relative;
  z-index:2;
}

.lock-star{
  width:200px;
  height:auto;
  animation:floatStar 3s ease-in-out infinite;
}
@keyframes floatStar{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

.shell{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.lock{
  width:min(420px,92vw);
  background:var(--card);
  color:var(--text);
  border:1px solid var(--line);
  backdrop-filter:blur(12px);
  border-radius:28px;
  padding:40px 28px 30px;
  text-align:center;
  box-shadow:0 14px 40px rgba(0,0,0,.18);
}
.lock h2{margin:10px 0 8px;font-family:'Gaegu',sans-serif;font-size:34px}
.lock p{margin:0 0 18px;color:var(--muted)}
.lock input{
  width:100%;padding:12px 14px;border-radius:12px;border:1px solid #d8dbe7;
  font:inherit;background:#fff;
}
.lock button{
  margin-top:12px;padding:12px 20px;border:none;border-radius:999px;
  background:linear-gradient(135deg,var(--pink),var(--yellow));
  font:700 18px 'Gaegu',sans-serif;color:#3d2f40;cursor:pointer;
}
.msg{margin-top:10px;color:#a14d66;min-height:20px}

.app{width:min(1120px,96vw)}
.header{text-align:center;margin-bottom:18px}
.header h1{
  margin:0;
  font-family:'Gaegu',sans-serif;
  font-size:42px;
}
.header p{margin:8px 0 0;color:#d4dcff}

.top-cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-bottom:20px;
}
.card{
  background:var(--card);
  color:var(--text);
  border-radius:22px;
  border:1px solid var(--line);
  backdrop-filter:blur(12px);
  box-shadow:0 10px 24px rgba(0,0,0,.14);
  padding:16px;
}
.metric-title{font-size:14px;color:var(--muted);margin-bottom:6px}
.metric-value{font-family:'Gaegu',sans-serif;font-size:30px;font-weight:700}
.metric-sub{font-size:14px;color:var(--muted);line-height:1.5}

.main{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:20px;
}
.panel-title{
  margin:0 0 10px;
  font-family:'Gaegu',sans-serif;
  font-size:28px;
}

.calendar-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.calendar-head button{
  border:none;border-radius:10px;background:#f8eaf1;color:#53445a;
  padding:8px 10px;cursor:pointer;font:700 16px 'Gaegu',sans-serif;
}
.weekdays,.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}
.weekdays div{
  text-align:center;
  color:var(--muted);
  font-size:13px;
}
.day{
  min-height:72px;
  background:#fff;
  border-radius:14px;
  border:1px solid #edf0f7;
  position:relative;
  padding:8px;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}
.day:hover{transform:translateY(-2px); box-shadow:0 6px 12px rgba(0,0,0,.08)}
.day.empty{visibility:hidden}
.day .num{font-size:13px;color:#555}
.day.saved{background:#fff4f8}
.day.selected{outline:2px solid #ffbdd5}
.day.today{box-shadow:inset 0 0 0 2px #ffe3a0}
.day .paw{
  position:absolute; left:5px; bottom:4px; font-size:12px;
}

input,select,textarea{
  width:100%;
  padding:12px 12px;
  border-radius:12px;
  border:1px solid #d9deeb;
  font:inherit;
  background:#fff;
  color:var(--text);
}
textarea{min-height:240px; resize:vertical}
.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
button.primary{
  margin-top:10px;
  border:none;
  border-radius:999px;
  padding:12px 18px;
  background:linear-gradient(135deg,var(--pink),var(--yellow));
  color:#453246;
  font:700 18px 'Gaegu',sans-serif;
  cursor:pointer;
}
.secondary{
  margin-left:8px;
  background:linear-gradient(135deg,#d9e7ff,#ffe7f2);
}
.note{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}
.speech{
  margin-top:14px;
  background:#fff;
  border-radius:16px;
  padding:14px 16px;
  position:relative;
  color:var(--text);
}
.speech.pop{animation:pop .45s ease}
@keyframes pop{
  0%{transform:scale(.96)}
  60%{transform:scale(1.04)}
  100%{transform:scale(1)}
}

/* shooting star */
.shooting-star{
  position:fixed;
  width:120px;
  height:2px;
  background:linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.9));
  transform:rotate(35deg);
  animation:shooting 2s linear forwards;
  pointer-events:none;
  z-index:3;
}
.shooting-star::after{
  content:"";
  position:absolute;
  right:-3px;
  top:-2px;
  width:6px;
  height:6px;
  border-radius:50%;
  background:white;
  box-shadow:0 0 6px white, 0 0 12px white;
}
@keyframes shooting{
  0%{transform:translate(0,0) rotate(35deg);opacity:0}
  10%{opacity:1}
  100%{transform:translate(600px,350px) rotate(35deg);opacity:0}
}

/* stars */
.star-field{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}
.star-dot{
  position:absolute;
  background:white;
  border-radius:50%;
  opacity:.7;
  animation:twinkleStar 3.5s ease-in-out infinite;
}
@keyframes twinkleStar{
  0%,100%{opacity:.3; transform:scale(.8)}
  50%{opacity:1; transform:scale(1.3)}
}

/* walking bear */
.walking-bear{
  position:fixed;
  bottom:16px;
  left:-120px;
  width:120px;
  height:120px;
  z-index:20;
  background-repeat:no-repeat;
  background-size:contain;
  background-position:center;
  animation:bearMove 38s linear infinite;
  pointer-events:none;
}
@keyframes bearMove{
  from{left:-80px}
  to{left:110vw}
}

.foot{
  position:fixed;
  font-size:14px;
  opacity:.95;
  pointer-events:none;
  z-index:50;
  animation:fadeFoot 3.6s ease forwards;
}
@keyframes fadeFoot{
  0%{opacity:.95; transform:scale(1)}
  100%{opacity:0; transform:translateY(6px) scale(.7)}
}

.bubble{
  position:fixed;
  bottom:92px;
  left:24px;
  background:rgba(255,255,255,.92);
  color:var(--text);
  padding:10px 14px;
  border-radius:16px;
  box-shadow:0 8px 18px rgba(0,0,0,.16);
  max-width:220px;
  z-index:25;
}

/* writing bear */
.writing-wrap{
  position:relative;
}
.writing-bear{
  position:absolute;
  right:18px;
  bottom:18px;
  width:160px;
  pointer-events:none;
  z-index:10;
}
.writing-bear img{
  width:100%;
  image-rendering:pixelated;
}

/* birthday bear */
.birthday-bear{
  position:fixed;
  right:20px;
  top:20px;
  width:140px;
  z-index:40;
  pointer-events:none;
  animation:floatBirthday 3s ease-in-out infinite;
}
@keyframes floatBirthday{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

@media (max-width:900px){
  .secondary{margin-left:0;margin-top:8px}
  .shell{padding:12px}
  .lock{padding:30px 20px}
  .lock h2{font-size:28px}
  .header h1{font-size:34px}
  .top-cards{grid-template-columns:1fr}
  .main{grid-template-columns:1fr}
  .card{padding:14px}
  textarea{min-height:180px}
  .calendar{gap:6px}
  .day{min-height:60px;font-size:13px}
  .writing-bear{width:130px}
}
</style>
</head>
<body>
<div class="star-field" id="starField"></div>

<div class="shell">
  <div class="lock" id="lockScreen">
    <div class="emoji">
      <img src="star.png" class="lock-star" alt="">
    </div>
    <h2>비밀번호를 입력하세요</h2>
    <p>하준이의 소중한 하루를 담아두는 비밀 일기장이에요</p>
    <input type="password" id="pw" />
    <button onclick="unlock()">들어가기</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="app hidden" id="app">
    <div class="header">
      <h1>하준이 육아일기</h1>
      <p>오늘의 웃음과 추억을 기록하는 밤하늘 다이어리</p>
    </div>

    <div class="top-cards">
      <div class="card">
        <div class="metric-title">하준이 나이</div>
        <div class="metric-value" id="age"></div>
        <div class="metric-sub">2023년 4월 12일 기준 자동 계산</div>
      </div>
      <div class="card">
        <div class="metric-title">이번달 기록</div>
        <div class="metric-value" id="count"></div>
        <div class="metric-sub">이번 달 저장한 날짜 수</div>
      </div>
      <div class="card">
        <div class="metric-title">곰돌이 메세지</div>
        <div class="metric-sub" id="bearMsg"></div>
      </div>
    </div>

    <div class="main">
      <div class="card">
        <div class="calendar-head">
          <h3 class="panel-title" id="monthLabel">이번 달 달력</h3>
          <div>
            <button type="button" onclick="changeMonth(-1)">◀</button>
            <button type="button" onclick="changeMonth(1)">▶</button>
          </div>
        </div>
        <div class="weekdays">
          <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>
        <div class="calendar" id="calendar"></div>
      </div>

      <div class="card">
        <h3 class="panel-title">오늘의 기록</h3>
        <div class="form-row">
          <input type="date" id="date">
          <select id="weather">
            <option>☀️ 맑음</option>
            <option>⛅ 구름</option>
            <option>☁️ 흐림</option>
            <option>🌧 비</option>
            <option>❄️ 눈</option>
            <option>🌈 특별한 하루</option>
          </select>
        </div>
        <div class="writing-wrap">
          <textarea id="text" placeholder="오늘 하준이는 뭐하고 놀았어?"></textarea>
          <div class="writing-bear"><img id="writeBear" src="bear3.png" alt=""></div>
        </div>
        <button class="primary" onclick="save()">일기 저장</button>
        <button class="primary secondary" type="button" onclick="backupDiary()">전체 일기 백업</button>
        <button class="primary secondary" type="button" onclick="document.getElementById('restoreFile').click()">백업 복원</button>
        <input type="file" id="restoreFile" accept=".json" hidden onchange="restoreDiary(event)">
        <div class="note">달력 날짜를 클릭하면 저장한 일기를 다시 불러와요.</div>
        <div class="speech" id="speech">
          <span id="speechText">오늘 하준이는 뭐하고 놀았어?</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="walking-bear" id="bear"></div>
<div class="bubble hidden" id="bubble"></div>
<img src="bear5.png" id="birthdayBear" class="birthday-bear hidden" alt="">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const PASSWORD = "0427";
const BIRTH = "2023-04-12";
const SUPABASE_URL = "https://mytuhgjimfjmmqxmewfd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dHVoZ2ppbWZqbW1xeG1ld2ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzc4NDAsImV4cCI6MjA4ODgxMzg0MH0.ooPIunXoOHbMGob_ihMSYpdO1Fl2yij-ErVelgzl-9A";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const lockScreen = document.getElementById("lockScreen");
const app = document.getElementById("app");
const msg = document.getElementById("msg");
const ageEl = document.getElementById("age");
const countEl = document.getElementById("count");
const bearMsg = document.getElementById("bearMsg");
const calendarEl = document.getElementById("calendar");
const dateEl = document.getElementById("date");
const weatherEl = document.getElementById("weather");
const textEl = document.getElementById("text");
const monthLabel = document.getElementById("monthLabel");
const speech = document.getElementById("speech");
const speechText = document.getElementById("speechText");
const bear = document.getElementById("bear");
const bubble = document.getElementById("bubble");
const writeBear = document.getElementById("writeBear");
const birthdayBear = document.getElementById("birthdayBear");

let viewYear = (new Date()).getFullYear();
let viewMonth = (new Date()).getMonth();
let footprintTimer = null;

const bearLines = [
  "오늘 하준이는 뭐했어?",
  "오늘 웃은 순간이 있었어?",
  "곰돌이가 기다리고 있어!",
  "귀여운 말 한마디 있었어?"
];
const talkLines = [
  "하준아 뭐했어?",
  "오늘도 재미있었어?",
  "곰돌이가 왔어!",
  "오늘 웃은 순간 적어볼까?"
];

const walkingFrames = ["bear1.png","bear2.png"];
let walkingFrameIndex = 0;

const writeFrames = ["bear3.png","bear4.png"];
const bearStar = "bear8.png";
const bearSleep = "bear6.png";
const bearHeart = "bear7.png";
let writing = false;
let writingFrameIndex = 0;
let writingTimer = null;
let idle2Timer = null;
let idle10Timer = null;
let heartTimer = null;

function animateBear(){
  bear.style.backgroundImage = `url(${walkingFrames[walkingFrameIndex]})`;
  walkingFrameIndex = (walkingFrameIndex + 1) % walkingFrames.length;
}

setInterval(animateBear, 350);

async function unlock(){
  if(document.getElementById("pw").value === PASSWORD){
    lockScreen.classList.add("hidden");
    app.classList.remove("hidden");
    await init();
  }else{
    msg.textContent = "비밀번호가 달라요";
  }
}

async function init(){
  const today = new Date();
  dateEl.value = toLocalDateString(today);
  updateAge();
  await buildCalendar();
  refreshBearMsg();
  checkBirthdayBear();
  generateStars();
  resetIdleTimers();

  let interval = 2600;
  const hour = today.getHours();
  if(hour >= 21 || hour <= 5) interval = 1400;

  setInterval(createShootingStar, interval);
  setInterval(showBearTalk, 9000);
  setInterval(refreshBearMsg, 9000);
  setInterval(syncBubblePosition, 80);

  if(footprintTimer) clearInterval(footprintTimer);
  footprintTimer = setInterval(dropFootprint, 600);

  animateBear();
}

function toLocalDateString(d){
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function updateAge(){
  const b = new Date(BIRTH);
  const t = new Date();
  let y = t.getFullYear() - b.getFullYear();
  let m = t.getMonth() - b.getMonth();
  let d = t.getDate() - b.getDate();
  if(d < 0){ m--; d += 30; }
  if(m < 0){ y--; m += 12; }
  ageEl.textContent = `${y}y ${m}m ${d}d`;
}

function refreshBearMsg(){
  bearMsg.textContent = bearLines[Math.floor(Math.random() * bearLines.length)];
}

async function save(){
  const date = dateEl.value;
  if(!date) return;

  const { error } = await sb.from("diary").upsert({
    date: date,
    text: textEl.value,
    weather: weatherEl.value
  }, { onConflict: "date" });

  if(error){
    console.error(error);
    speechText.textContent = "저장 중 오류가 났어요";
    return;
  }

  await buildCalendar();

  speech.classList.remove("pop");
  void speech.offsetWidth;
  speech.classList.add("pop");
  speechText.textContent = "곰돌이가 기억했어요!";
  createShootingStar();
}

async function loadEntry(date){
  const { data, error } = await sb
    .from("diary")
    .select("*")
    .eq("date", date)
    .maybeSingle();

  if(error){
    console.error(error);
    return;
  }

  if(!data) return;

  dateEl.value = date;
  textEl.value = data.text || "";
  weatherEl.value = data.weather || "☀️ 맑음";
  speechText.textContent = "이 날의 기록을 불러왔어!";
}

async function buildCalendar(){
  calendarEl.innerHTML = "";
  monthLabel.textContent = `${viewYear}년 ${viewMonth + 1}월`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();
  const todayStr = toLocalDateString(new Date());

  const monthStart = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-01`;
  const monthEnd = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(lastDate).padStart(2,"0")}`;

  const { data, error } = await sb
    .from("diary")
    .select("date")
    .gte("date", monthStart)
    .lte("date", monthEnd);

  if(error) console.error(error);

  const savedDates = new Set((data || []).map(item => item.date));

  for(let i = 0; i < firstDay; i++){
    const empty = document.createElement("div");
    empty.className = "day empty";
    calendarEl.appendChild(empty);
  }

  let count = 0;

  for(let i = 1; i <= lastDate; i++){
    const d = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
    const cell = document.createElement("div");
    cell.className = "day";

    if(savedDates.has(d)){
      cell.classList.add("saved");
      count++;
      const paw = document.createElement("div");
      paw.className = "paw";
      paw.textContent = "🐾";
      cell.appendChild(paw);
    }

    if(d === todayStr) cell.classList.add("today");
    if(dateEl.value === d) cell.classList.add("selected");

    const num = document.createElement("div");
    num.className = "num";
    num.textContent = i;
    cell.appendChild(num);

    cell.onclick = async () => {
      if(savedDates.has(d)){
        await loadEntry(d);
      }else{
        dateEl.value = d;
        textEl.value = "";
      }
      await buildCalendar();
    };

    calendarEl.appendChild(cell);
  }

  countEl.textContent = count + "일";
}

async function changeMonth(diff){
  viewMonth += diff;
  if(viewMonth < 0){ viewMonth = 11; viewYear--; }
  if(viewMonth > 11){ viewMonth = 0; viewYear++; }
  await buildCalendar();
}

function createShootingStar(){
  const star = document.createElement("div");
  star.className = "shooting-star";
  star.style.left = "-120px";
  star.style.top = (Math.random() * window.innerHeight * 0.6) + "px";
  document.body.appendChild(star);
  setTimeout(()=> star.remove(), 2000);
}

function dropFootprint(){
  const rect = bear.getBoundingClientRect();
  if(rect.left < -20 || rect.left > window.innerWidth - 10) return;

  const foot = document.createElement("div");
  foot.className = "foot";
  foot.textContent = "🐾";
  foot.style.left = (rect.left + 28) + "px";
  foot.style.top = (rect.bottom - 8) + "px";
  document.body.appendChild(foot);
  setTimeout(()=> foot.remove(), 3600);
}

function syncBubblePosition(){
  if(bubble.classList.contains("hidden")) return;
  const r = bear.getBoundingClientRect();
  bubble.style.left = (r.left + 20) + "px";
  bubble.style.top = (r.top - 50) + "px";
}

function showBearTalk(){
  const r = bear.getBoundingClientRect();
  bubble.textContent = talkLines[Math.floor(Math.random() * talkLines.length)];
  bubble.classList.remove("hidden");
  bubble.style.left = Math.max(12, Math.min(window.innerWidth - 220, r.left + 20)) + "px";
  bubble.style.top = Math.max(12, r.top - 50) + "px";
  bubble.style.bottom = "auto";
  setTimeout(()=> bubble.classList.add("hidden"), 1600);
}

async function backupDiary(){
  const { data, error } = await sb
    .from("diary")
    .select("*")
    .order("date", { ascending: true });

  if(error){
    console.error(error);
    speechText.textContent = "백업 중 오류가 났어요";
    return;
  }

  const blob = new Blob([JSON.stringify(data || [], null, 2)], {
    type: "application/json;charset=utf-8"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = toLocalDateString(new Date());

  a.href = url;
  a.download = `hajun-diary-backup-${today}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);

  speech.classList.remove("pop");
  void speech.offsetWidth;
  speech.classList.add("pop");
  speechText.textContent = "곰돌이가 백업 파일을 준비했어요!";
}

async function restoreDiary(event){
  const file = event.target.files[0];
  if(!file) return;

  try{
    const text = await file.text();
    const items = JSON.parse(text);

    if(!Array.isArray(items)){
      speechText.textContent = "올바른 백업 파일이 아니에요";
      return;
    }

    const cleaned = items
      .filter(item => item && item.date)
      .map(item => ({
        date: item.date,
        text: item.text || "",
        weather: item.weather || "☀️ 맑음"
      }));

    if(cleaned.length === 0){
      speechText.textContent = "복원할 데이터가 없어요";
      return;
    }

    const { error } = await sb
      .from("diary")
      .upsert(cleaned, { onConflict: "date" });

    if(error){
      console.error(error);
      speechText.textContent = "복원 중 오류가 났어요";
      return;
    }

    await buildCalendar();

    speech.classList.remove("pop");
    void speech.offsetWidth;
    speech.classList.add("pop");
    speechText.textContent = "곰돌이가 일기를 다시 불러왔어요!";
  }catch(err){
    console.error(err);
    speechText.textContent = "백업 파일을 읽지 못했어요";
  }

  event.target.value = "";
}

function generateStars(){
  const field = document.getElementById("starField");
  field.innerHTML = "";
  for(let i = 0; i < 120; i++){
    const s = document.createElement("div");
    s.className = "star-dot";
    const size = Math.random() * 3 + 1;
    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = Math.random() * 100 + "vh";
    s.style.animationDelay = (Math.random() * 4) + "s";
    field.appendChild(s);
  }
}

function checkBirthdayBear(){
  const today = new Date();
  const m = today.getMonth() + 1;
  const d = today.getDate();
  const birthdays = [
    {m:4, d:12},
    {m:4, d:27},
    {m:10, d:4}
  ];
  const show = birthdays.some(b => b.m === m && b.d === d);
  birthdayBear.classList.toggle("hidden", !show);
}

function setWriteBear(src){
  writeBear.src = src;
}

function startWriting(){
  if(writing) return;
  writing = true;
  clearInterval(writingTimer);
  writingTimer = setInterval(()=>{
    writingFrameIndex = (writingFrameIndex + 1) % writeFrames.length;
    setWriteBear(writeFrames[writingFrameIndex]);
  }, 280);
}

function stopWriting(){
  writing = false;
  clearInterval(writingTimer);
}

function resetIdleTimers(){
  clearTimeout(idle2Timer);
  clearTimeout(idle10Timer);

  idle2Timer = setTimeout(()=>{
    stopWriting();
    setWriteBear(bearStar);
  }, 2000);

  idle10Timer = setTimeout(()=>{
    stopWriting();
    setWriteBear(bearSleep);
  }, 10000);
}

textEl.addEventListener("input", ()=>{
  startWriting();
  resetIdleTimers();
});

textEl.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    stopWriting();
    setWriteBear(bearHeart);
    clearTimeout(heartTimer);
    heartTimer = setTimeout(()=>{
      startWriting();
      resetIdleTimers();
    }, 1200);
  }
});

window.addEventListener("load", ()=>{
  generateStars();
  checkBirthdayBear();
});
</script>
